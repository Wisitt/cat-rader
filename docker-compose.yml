services:
  db:
    image: postgis/postgis:16-3.5
    platform: linux/amd64
    container_name: petradar-postgis
    environment:
      POSTGRES_DB: petradar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - petradar_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petradar"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  petradar_postgres_data:
